<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe Kitchen — Fine Dining</title>
    <meta name="description" content="Authentic flavors crafted with the finest ingredients" />

    <!-- ── Favicon ── -->
    <!-- SVG favicon: Chrome 80+, Firefox 41+, Edge 80+, Safari 16.4+ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fallback for browsers that don't support SVG favicons -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg" />

    <!-- ── Apple / iOS ── -->
    <!-- iOS Safari home-screen icon (uses the SVG; PNG recommended for older iOS) -->
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Luxe Kitchen" />

    <!-- ── PWA / Android ── -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#c9a84c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Raleway:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
