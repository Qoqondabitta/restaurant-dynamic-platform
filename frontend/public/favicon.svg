<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>Luxe Kitchen</title>

  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>

  <!-- Subtle warm glow behind the letter -->
  <radialGradient id="glow" cx="50%" cy="55%" r="45%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="20" fill="url(#glow)"/>

  <!-- Gold outer border -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="18" fill="none" stroke="#c9a84c" stroke-width="2"/>

  <!-- Inner hairline ring (visible at larger sizes) -->
  <rect x="7" y="7" width="86" height="86" rx="14" fill="none" stroke="#c9a84c" stroke-width="0.6" opacity="0.30"/>

  <!-- Corner bracket ornaments -->
  <g stroke="#c9a84c" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 21 L13 12 L22 12"/>
    <path d="M78 12 L87 12 L87 21"/>
    <path d="M13 79 L13 88 L22 88"/>
    <path d="M87 79 L87 88 L78 88"/>
  </g>

  <!-- Small gold diamond top -->
  <polygon points="50,21 52.5,25 50,23.5 47.5,25" fill="#c9a84c" opacity="0.70"/>
  <!-- Small gold diamond bottom -->
  <polygon points="50,79 52.5,75 50,76.5 47.5,75" fill="#c9a84c" opacity="0.70"/>

  <!-- Elegant italic "L" -->
  <text
    x="52" y="74"
    font-family="Georgia, 'Palatino Linotype', Palatino, 'Book Antiqua', serif"
    font-size="62"
    font-style="italic"
    font-weight="400"
    fill="#c9a84c"
    text-anchor="middle"
  >L</text>
</svg>
